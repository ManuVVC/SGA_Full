# ============================================================
# nginx.conf — Configuración del servidor Nginx para SGA PDA
#
# Sirve el build estático de React y actúa como proxy
# inverso hacia el backend Flask para las llamadas /api/*
# ============================================================

server {
    listen 80;
    server_name _;

    # Directorio raíz del build de producción de React
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para reducir el tamaño de las respuestas
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ── Proxy inverso al backend Flask ──────────────────────
    # Todas las peticiones a /api/* se redirigen al contenedor backend.
    # El rewrite elimina el prefijo /api antes de pasar a Flask:
    #   /api/auth/terminal  →  /auth/terminal
    #   /api/entradas/...   →  /entradas/...
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para operaciones largas de almacén
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── SPA fallback ─────────────────────────────────────────
    # React Router necesita que todas las rutas sirvan index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Caché de assets estáticos ────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
