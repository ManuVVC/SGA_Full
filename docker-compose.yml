# ============================================================
# docker-compose.yml — Orquestador base del monorepo SGA
#
# IMPORTANTE: No usar directamente. Siempre pasar --env-file
# para que las variables ${VAR} se resuelvan desde el fichero
# de entorno correcto (producción o desarrollo).
#
# Producción:
#   docker compose -f docker-compose.yml --env-file .env.prod up -d --build
# Desarrollo:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up -d --build
# ============================================================

services:

  # ── Backend Flask (API) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sga_backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      # ── Flask ──────────────────────────────────────────────
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY}
      - AUDIT_LOG_ENABLED=${AUDIT_LOG_ENABLED:-True}
      # ── Oracle ─────────────────────────────────────────────
      - ORACLE_USER=${ORACLE_USER}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_DSN=${ORACLE_DSN}
      - ORACLE_MIN=${ORACLE_MIN:-1}
      - ORACLE_MAX=${ORACLE_MAX:-5}
      - ORACLE_CLIENT_PATH=${ORACLE_CLIENT_PATH:-/opt/oracle/instantclient_19_19}
      # ── Aplicación ─────────────────────────────────────────
      - PRINT_PDF_FOLDER=${PRINT_PDF_FOLDER:-/app/print_queue}
      - DEV_DEFAULT_TERMINAL_IP=${DEV_DEFAULT_TERMINAL_IP}
      - SESSION_TIMEOUT_MINUTES=${SESSION_TIMEOUT_MINUTES:-30}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend PDA (React → Nginx) ────────────────────────
  pda:
    build:
      context: ./pda
      dockerfile: Dockerfile
      target: production
    container_name: sga_pda
    ports:
      - "${PDA_PORT:-5173}:${PDA_CONTAINER_PORT:-80}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
