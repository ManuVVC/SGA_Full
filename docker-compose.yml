# ============================================================
# docker-compose.yml — Orquestador de PRODUCCIÓN del monorepo SGA
# Uso: docker compose up --build
# ============================================================

services:

  # ── Backend Flask (API) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sga_backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend PDA (React → Nginx) ────────────────────────
  pda:
    build:
      context: ./pda
      dockerfile: Dockerfile
      target: production
    container_name: sga_pda
    ports:
      - "${PDA_PORT:-8080}:${PDA_CONTAINER_PORT:-80}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
