# ============================================================
# docker-compose.dev.yml — Sobreescritura para DESARROLLO
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# En modo dev:
#   - El backend monta el código en caliente (Flask debug)
#   - El frontend corre con Vite dev server (hot-reload)
#     en lugar del build Nginx de producción
# ============================================================

services:

  # ── Backend Flask en modo debug ─────────────────────────
  backend:
    container_name: sga_backend_dev
    volumes:
      # Monta el código fuente para hot-reload sin reconstruir la imagen
      - ./backend:/app
    environment:
      # Sobreescribir sólo lo que cambia respecto al compose base
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    # Sobreescribir healthcheck en dev para no bloquear el arranque
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 2s
      retries: 1

  # ── Frontend PDA con Vite dev server ────────────────────
  pda:
    build:
      context: ./pda
      dockerfile: Dockerfile
      target: development
    container_name: sga_pda_dev
    volumes:
      - ./pda:/app
      - /app/node_modules  # Volumen anónimo para aislar node_modules del host
    environment:
      - NODE_ENV=development
